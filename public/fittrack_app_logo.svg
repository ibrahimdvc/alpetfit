<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#gradient)" />
  <g transform="translate(116, 116)" filter="url(#glow)">
    <!-- Dumbbell Shape -->
    <!-- Left Plate Outer -->
    <rect x="0" y="70" width="36" height="140" rx="18" fill="#ffffff" />
    <!-- Left Plate Inner -->
    <rect x="44" y="90" width="28" height="100" rx="14" fill="#f3e8ff" opacity="0.9" />
    
    <!-- Central Bar -->
    <rect x="56" y="122" width="168" height="36" rx="10" fill="#ffffff" />
    
    <!-- Right Plate Inner -->
    <rect x="208" y="90" width="28" height="100" rx="14" fill="#f3e8ff" opacity="0.9" />
    <!-- Right Plate Outer -->
    <rect x="244" y="70" width="36" height="140" rx="18" fill="#ffffff" />
    
    <!-- Highlight Overlay -->
    <circle cx="140" cy="140" r="16" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
